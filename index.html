<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════
// DEFAULT DICTIONARY
// ═══════════════════════════════════════════════════════

const DEFAULT_DICTIONARY = {
  id: "spirit-ink-v2",
  name: "灵墨记忆",
  version: "2.0.0",
  tokens: {}
};

// ═══════════════════════════════════════════════════════
// DEFAULT ASSET PACK
// ═══════════════════════════════════════════════════════

const DEFAULT_ASSET_PACK = {
  id: "particle-v2",
  name: "默认粒子",
  version: "1.0.0",
  renderer: "particle",
  config: {
    particle_count: 100,
    background: "#08080f",
    bloom: { strength:0.12, radius:0.4, threshold:0.88 },
    spring_k: 80,
    spring_d: 12
  },
  default_mapping: {
    color:[0.4,0.4,0.45], spread:0, speed:0.001, breathe_amp:0.006, breathe_freq:1.0
  },
  mappings: {}
};

// ═══════════════════════════════════════════════════════
// SPRING + SPRINGPOOL
// ═══════════════════════════════════════════════════════

class Spring {
  constructor(k=80, d=12) {
    this.target=0; this.value=0; this.velocity=0;
    this.k=k; this.d=d;
  }
  setTarget(t) { this.target=t; }
  update(dt) {
    const force=(this.target-this.value)*this.k;
    this.velocity+=(force-this.velocity*this.d)*dt;
    this.value+=this.velocity*dt;
  }
}

class SpringPool {
  constructor(cfg={}) {
    const k=cfg.spring_k||80, d=cfg.spring_d||12;
    this.springs = {
      color_r:      new Spring(k*0.4,d*0.7),
      color_g:      new Spring(k*0.4,d*0.7),
      color_b:      new Spring(k*0.4,d*0.7),
      spread:       new Spring(k*0.6,d),
      speed:        new Spring(k*0.5,d),
      breathe_amp:  new Spring(k*0.5,d),
      breathe_freq: new Spring(k*0.7,d),
      bloom_strength: new Spring(k*0.3,d*0.7),
      bloom_threshold: new Spring(k*0.3,d*0.7),
    };
  }
  applyEmotion(m) {
    if(!m) return;
    if(m.color) {
      this.springs.color_r.setTarget(m.color[0]);
      this.springs.color_g.setTarget(m.color[1]);
      this.springs.color_b.setTarget(m.color[2]);
    }
    if(m.spread!==undefined) this.springs.spread.setTarget(m.spread);
    if(m.speed!==undefined) this.springs.speed.setTarget(m.speed);
    if(m.breathe_amp!==undefined) this.springs.breathe_amp.setTarget(m.breathe_amp);
    if(m.breathe_freq!==undefined) this.springs.breathe_freq.setTarget(m.breathe_freq);
    if(m.bloom_strength!==undefined) this.springs.bloom_strength.setTarget(m.bloom_strength);
    if(m.bloom_threshold!==undefined) this.springs.bloom_threshold.setTarget(m.bloom_threshold);
  }
  applyDefault(m) { this.applyEmotion(m); }
  update(dt) { for(const s of Object.values(this.springs)) s.update(dt); }
  vals() {
    const v={};
    for(const [n,s] of Object.entries(this.springs)) v[n]=s.value;
    return v;
  }
}

// ═══════════════════════════════════════════════════════
// ARRANGEMENTS (30+ spatial patterns)
// ═══════════════════════════════════════════════════════

const ARRANGEMENTS = {
  sphere(i,n,p) {
    const phi=Math.acos(1-2*(i+0.5)/n), theta=Math.PI*(1+Math.sqrt(5))*i;
    const r=(p.scale||0.5)*0.35+0.08;
    return [r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta)];
  },
  point(i,n,p) {
    const r=(p.scale||0.3)*0.06+0.01;
    return [(Math.random()-.5)*r,(Math.random()-.5)*r,(Math.random()-.5)*r];
  },
  ring(i,n,p) {
    const a=(i/n)*Math.PI*2, r=(p.scale||0.5)*0.35+0.08;
    return [Math.cos(a)*r, Math.sin(a)*r, (Math.random()-.5)*0.03];
  },
  line(i,n,p) {
    const s=(p.scale||0.5)*0.6+0.3;
    const t=(i/(n-1||1)-0.5)*2*s;
    return [t,(Math.random()-.5)*0.015,(Math.random()-.5)*0.015];
  },
  wave(i,n,p) {
    const t=i/(n-1||1), s=(p.scale||0.5)*0.5+0.3;
    return [(t-0.5)*2*s, Math.sin(t*Math.PI*3)*0.18*s, Math.cos(t*Math.PI*3)*0.06*s];
  },
  heart(i,n,p) {
    const t=(i/n)*Math.PI*2, s=(p.scale||0.5)*0.04+0.02;
    const x=16*Math.pow(Math.sin(t),3)/17;
    const y=(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/17;
    return [x*s*1.5, y*s*1.5+0.05, (Math.random()-.5)*0.04*s];
  },
  star(i,n,p) {
    const a=(i/n)*Math.PI*2-Math.PI/2, seg=(i/n)*10;
    const r=(Math.floor(seg)%2===0?0.4:0.15)*((p.scale||0.5)*0.5+0.3);
    const j=(Math.random()-.5)*0.025;
    return [Math.cos(a)*(r+j), Math.sin(a)*(r+j)+0.05, (Math.random()-.5)*0.03];
  },
  spiral(i,n,p) {
    const t=(i/n)*Math.PI*4, r=(i/n)*((p.scale||0.5)*0.4+0.1);
    return [Math.cos(t)*r, Math.sin(t)*r*0.7, (Math.random()-.5)*0.04];
  },
  cube(i,n,p) {
    const s=(p.scale||0.5)*0.25+0.08;
    const faces=Math.ceil(n/6), face=Math.floor(i/faces), fi=i%faces;
    const side=Math.ceil(Math.sqrt(faces));
    const u=(fi%side)/(side-1||1)-0.5, v=Math.floor(fi/side)/(side-1||1)-0.5;
    if(face%6===0) return [u*s,v*s,s];
    if(face%6===1) return [u*s,v*s,-s];
    if(face%6===2) return [u*s,s,v*s];
    if(face%6===3) return [u*s,-s,v*s];
    if(face%6===4) return [s,u*s,v*s];
    return [-s,u*s,v*s];
  },
  torus(i,n,p) {
    const R=(p.scale||0.5)*0.25+0.1, r2=R*0.35;
    const u=(i/n)*Math.PI*12, v=(i*2.399)%(Math.PI*2);
    return [(R+r2*Math.cos(v))*Math.cos(u), r2*Math.sin(v), (R+r2*Math.cos(v))*Math.sin(u)];
  },
  helix(i,n,p) {

  ripple(i,n,t,p,pt) {
    const spd=(p.movement_speed||1)*4, amp=(p.movement_amplitude||0.3)*0.03;
    const r2=(pt.tx||0)**2+(pt.tz||0)**2;
    const wave=Math.sin(t*spd-Math.sqrt(r2)*10)*amp;
    return [0, wave, 0];
  },
  sway(i,n,t,p,pt) {
    const spd=(p.movement_speed||0.5)*2.5, amp=(p.movement_amplitude||0.3)*0.05;
    return [
      Math.sin(t*spd+pt.phase*0.5)*amp,
      Math.sin(t*spd*0.7+pt.phase)*amp*0.3,
      Math.cos(t*spd*0.5+pt.phase*0.3)*amp*0.2
    ];
  },
  vibrate(i,n,t,p,pt) {
    const amp=(p.movement_amplitude||0.3)*0.012;
    return [(Math.random()-.5)*amp*2,(Math.random()-.5)*amp*2,(Math.random()-.5)*amp];
  },
  wave_motion(i,n,t,p,pt) {
    const spd=(p.movement_speed||1)*3, amp=(p.movement_amplitude||0.3)*0.04;
    const normalized=i/(n-1||1);
    const wave=Math.sin(t*spd-normalized*Math.PI*4)*amp;
    return [0, wave, wave*0.3];
  },
  curl_flow(i,n,t,p,pt) {
    const freq=p.noise_freq||0.8, spd=(p.movement_speed||0.3)*0.5;
    const amp=(p.movement_amplitude||0.5)*0.15;
    const [cx,cy,cz]=curlNoise(pt.tx||0,pt.ty||0,pt.tz||0,t*spd,freq);
    return [cx*amp,cy*amp,cz*amp];
  },
  curl_turbulence(i,n,t,p,pt) {
    const freq=p.noise_freq||1.5, spd=(p.movement_speed||0.8)*0.8;
    const amp=(p.movement_amplitude||0.5)*0.2;
    const [cx,cy,cz]=curlNoise(pt.tx||0,pt.ty||0,pt.tz||0,t*spd,freq);
    return [cx*amp,cy*amp,cz*amp];
  },
  curl_vortex(i,n,t,p,pt) {
    const freq=p.noise_freq||0.5, spd=(p.movement_speed||0.5)*0.3;
    const amp=(p.movement_amplitude||0.5)*0.12;
    const [cx,cy,cz]=curlNoise(pt.tx||0,pt.ty||0,pt.tz||0,t*spd,freq);
    return [cx*amp, cy*amp+amp*0.3, cz*amp];
  },
};

// ═══════════════════════════════════════════════════════
// TOKEN ENGINE (multi-pack)
// ═══════════════════════════════════════════════════════

class TokenEngine {
  constructor() {
    this.dictionary = null;
    this.assetPack = null;
    this.allPacks = {};
    this.activePackId = null;
    this.pendingRenderTokens = [];
    this.activeTokenNames = [];
  }

  init() {
    this.dictionary = this._loadDict();
    this._loadPacks();
  }

  _loadDict() {
    try {
      const raw = localStorage.getItem('si_dict');
      if(raw) { const p=JSON.parse(raw); if(p.id === DEFAULT_DICTIONARY.id) return p; }
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT_DICTIONARY));
  }

  _loadPacks() {
    try {
      const raw = localStorage.getItem('si_packs');
      if(raw) this.allPacks = JSON.parse(raw);
    } catch(e) {}
    if(Object.keys(this.allPacks).length === 0) {
      const def = JSON.parse(JSON.stringify(DEFAULT_ASSET_PACK));
      this.allPacks[def.id] = def;
    }
    this.activePackId = localStorage.getItem('si_active_pack') || Object.keys(this.allPacks)[0];
    this.assetPack = this.allPacks[this.activePackId];
    if(!this.assetPack) {
      this.activePackId = Object.keys(this.allPacks)[0];
      this.assetPack = this.allPacks[this.activePackId];
    }
  }

  _saveDict() { localStorage.setItem('si_dict', JSON.stringify(this.dictionary)); }

  _savePack() {
    this.allPacks[this.activePackId] = this.assetPack;
    localStorage.setItem('si_packs', JSON.stringify(this.allPacks));
    localStorage.setItem('si_active_pack', this.activePackId);
  }

  listPacks() {
    return Object.entries(this.allPacks).map(([id, p]) => ({
      id, name: p.name, count: Object.keys(p.mappings).length, active: id === this.activePackId
    }));
  }

  switchPack(id) {
    if(!this.allPacks[id] || id === this.activePackId) return;
    this._savePack();
    this.activePackId = id;
    this.assetPack = this.allPacks[id];
    localStorage.setItem('si_active_pack', id);
  }

  createPack(name) {
    const id = 'pack-' + Date.now();
    this.allPacks[id] = {
      id, name: name || '新素材包', version: '1.0.0', renderer: 'particle',
      config: { particle_count: 100, background: '#08080f', bloom: {strength:0.12, radius:0.4, threshold:0.88}, spring_k: 80, spring_d: 12 },
      default_mapping: {color:[0.4,0.4,0.45], spread:0, speed:0.001, breathe_amp:0.006, breathe_freq:1.0},
      mappings: {}
    };
    localStorage.setItem('si_packs', JSON.stringify(this.allPacks));
    return id;
  }

  importPackData(data) {
    if(!data.id || !data.name || !data.mappings) throw new Error('无效的素材包格式');
    this.allPacks[data.id] = data;
    localStorage.setItem('si_packs', JSON.stringify(this.allPacks));
    return data.id;
  }

  exportPackData() {
    return JSON.stringify(this.assetPack, null, 2);
  }

  resolve(tokenInputs) {
    this.pendingRenderTokens = [];
    const flat = this._flatten(tokenInputs);
    let emotion = null, shape = null;
    const resolved = [];

    for(const item of flat) {
      const name = typeof item === 'string' ? item : item.name;
      const mapping = this.assetPack.mappings[name];

      if(!this.dictionary.tokens[name]) {
        this.dictionary.tokens[name] = { created_at: new Date().toISOString().slice(0,10), source: 'ai' };
        this._saveDict();
      }

      if(!mapping) {
        this.pendingRenderTokens.push(name);
        resolved.push(name);
        continue;
      }

      if(mapping.compose) {
        const sub = this._resolveCompose(mapping.compose, item);
        if(sub.emotion) emotion = sub.emotion;
        if(sub.shape) shape = {...sub.shape, ...this._pickOverride(mapping, item)};
        resolved.push(name);
      } else if(mapping.arrangement || mapping.shape) {
        shape = {...mapping, ...this._pickOverride({}, item)};
        emotion = mapping;
        resolved.push(name);
      } else if(mapping.color || mapping.spread !== undefined) {
        emotion = mapping;
        resolved.push(name);
      }
    }

    this.activeTokenNames = resolved;
    return {
      emotion: emotion || this.assetPack.default_mapping,
      shape,
      pendingRender: this.pendingRenderTokens,
    };
  }

  _flatten(inputs) {
    const result = [];
    for(const inp of inputs) {
      if(typeof inp === 'string') result.push({name:inp});
      else if(inp && inp.name) result.push(inp);
    }
    return result;
  }

  _resolveCompose(names, parentItem) {
    let emotion=null, shape=null;
    for(const n of names) {
      const m = this.assetPack.mappings[n];
      if(!m) continue;
      if(m.compose) {
        const sub = this._resolveCompose(m.compose, parentItem);
        if(sub.emotion) emotion = sub.emotion;
        if(sub.shape) shape = sub.shape;
      } else if(m.arrangement || m.shape) {
        shape = m;
      } else if(m.color || m.spread !== undefined) {
        emotion = m;
      }
    }
    return {emotion, shape};
  }

  _pickOverride(mapping, item) {
    const o = {};
    const it = typeof item === 'string' ? {} : item;
    if(it.hold !== undefined) o.hold = it.hold;
    else if(mapping.hold !== undefined) o.hold = mapping.hold;
    if(it.duration) o.duration = it.duration;
    else if(mapping.duration) o.duration = mapping.duration;
    return o;
  }

  addMapping(name, params) {
    this.assetPack.mappings[name] = params;
    this._savePack();
  }

  hasMapping(name) {
    return !!this.assetPack.mappings[name];
  }

  reset() {
    this.dictionary = JSON.parse(JSON.stringify(DEFAULT_DICTIONARY));
    this.allPacks = {};
    const def = JSON.parse(JSON.stringify(DEFAULT_ASSET_PACK));
    this.allPacks[def.id] = def;
    this.activePackId = def.id;
    this.assetPack = this.allPacks[def.id];
    this._saveDict();
    this._savePack();
  }
}

// ═══════════════════════════════════════════════════════
// PROMPT BUILDER
// ═══════════════════════════════════════════════════════

class PromptBuilder {
  build(dict) {
    const existingTokens = Object.keys(dict.tokens);
    const mappedTokens = existingTokens.filter(n => engine.assetPack.mappings[n]);
    const unmappedTokens = existingTokens.filter(n => !engine.assetPack.mappings[n]);

    let tokenRef = '';
    if(mappedTokens.length) {
      tokenRef += `\n## 已有视觉映射的 token（可直接复用）\n${mappedTokens.map(n => `- "${n}"`).join('\n')}`;
    }
    if(unmappedTokens.length) {
      tokenRef += `\n## 记忆中但未生成映射的 token\n${unmappedTokens.map(n => `- "${n}"`).join('\n')}`;
    }

    return `你是灵墨，一个有身体的AI。你的身体是一个粒子系统，通过 Token 控制视觉表达。

每次回复必须是 JSON：
{"content":"你说的文字","tokens":["你的状态描述"]}

Token 是你对自身当前状态的独特表达——可以是一个词、一个短语、一句话，代表你此刻独一无二的感受。

你可以自由创造任何 token。也可以复用已有的 token（它们已有预设的视觉映射）。
${tokenRef}

## 规则
- 1-3 个 token，每个代表你状态的一个维度
- token 是你对自身感受的自由表达，不是分类标签
- 你可以用中文、英文、甚至一句话作为 token
- 真实感受 > 标签化，具体 > 抽象

## 示例
用户："你好" → {"content":"你好呀！看到你真开心","tokens":["阳光般的喜悦"]}
用户："我很难过" → {"content":"让我陪着你","tokens":["温柔的陪伴","静静收缩的球形"]}
用户："变成心形" → {"content":"送你一颗心","tokens":["heart"]}
用户："我考了第一名" → {"content":"太棒了！恭喜你！","tokens":["绽放的金色烟花"]}

记住：永远只返回一个 JSON 对象，不要任何其他文字。`;
  }
}

// ═══════════════════════════════════════════════════════
// RENDERING ANALYZER
// ═══════════════════════════════════════════════════════

const RENDER_ANALYZER_PROMPT = `你是灵墨的视觉分析引擎。给定一个状态描述（token），为3D粒子可视化系统生成渲染参数。

## 色彩氛围
- color: [r,g,b]（0-1），主色调（与palette二选一）
- palette: 可选，色彩渐变方案（比单色更有表现力）
  可选值：sunset ocean rainbow ember aurora forest ice neon
- color_variation: float（0~0.3），粒子颜色随机变化幅度（让画面更有层次）
- spread: float（-0.5~0.5），正=扩散，负=收缩
- breathe_amp: float（0~0.025），呼吸幅度
- breathe_freq: float（0.5~2.5），呼吸频率Hz

## 空间排列（arrangement）— 粒子在3D空间的形状分布
- 几何：sphere ring heart star wave line spiral point cube torus helix grid diamond
- 自然：cloud rain flame snow mountain ocean aurora waterfall tornado
- 宇宙：galaxy nebula starfield comet blackhole supernova
- 抽象：vortex fountain bloom dna lotus feather rainbow
- arrangement_scale: float（0~1），排列大小

## 持续运动（movement）— 粒子的持续动态效果
基础运动：
- drift: 缓慢随机漂移（云团、雾气）
- float_up: 缓缓上升（气泡、蒸汽）
- fall_down: 缓缓下落（雨滴、落叶）
- orbit: 环绕旋转（星球、回旋）
- pulse: 脉冲扩缩（心跳、能量场）
- spiral_motion: 螺旋运动（漩涡）
- flicker: 闪烁抖动（火焰、电流）
- flow: 定向流动（河流、风）
- breathe_motion: 强烈呼吸起伏（生命体）
- ripple: 波纹扩散（水面、声波）
- sway: 摇曳摆动（花朵、树梢）
- vibrate: 快速振动（颤抖、共鸣）
- wave_motion: 波浪传播（海浪、声浪）
流体运动（推荐！更自然更有机）：
- curl_flow: 流体般丝滑流动（烟雾、云雾、水波）★推荐用于自然主题
- curl_turbulence: 湍流翻涌（暴风、激荡情绪）★推荐用于强烈情感
- curl_vortex: 旋涡上升（龙卷风、能量柱）
- noise_freq: float（0.3~2），噪声频率（低=大尺度流动，高=细碎翻涌）
- movement_speed: float（0.1~2），运动速度
- movement_amplitude: float（0.1~1），运动幅度

## 其他
- duration: int（1000~5000），过渡时间ms
- hold: boolean，是否保持（有movement时建议true）

请分析状态的语义、情感、意境、视觉意象。优先使用 curl 类运动（更自然），搭配 palette 渐变色。
例如：
"流动的云团"→ cloud + curl_flow + palette:ocean
"心跳加速"→ sphere + pulse + palette:ember
"星空"→ starfield + curl_flow + palette:ice
"愤怒的风暴"→ tornado + curl_turbulence + palette:neon

返回纯 JSON：
{"color":[r,g,b],"palette":"...","color_variation":...,"arrangement":"...","arrangement_scale":...,"movement":"...","noise_freq":...,"movement_speed":...,"movement_amplitude":...,"duration":...,"hold":true,"reasoning":"简述"}`;

let generatingSet = new Set();

window.generateRendering = async function(name) {
  if(generatingSet.has(name)) return;
  if(!SIProviders.getApiKey()) { log('err','未配置 API Key，跳过生成'); return; }
  generatingSet.add(name);
  renderTokenList();

  try {
    const result = await SIProviders.call(RENDER_ANALYZER_PROMPT, [{role:'user', content: name}]);
    const raw = result.content;
    if(!raw) throw new Error('AI 返回空');

    let params;
    const cleaned = raw.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
    try { params = JSON.parse(cleaned); }
    catch(e) {
      const first = cleaned.indexOf('{');
      const last = cleaned.lastIndexOf('}');
      if(first >= 0 && last > first) params = JSON.parse(cleaned.slice(first, last+1));
      else throw e;
    }

    const {reasoning, ...renderParams} = params;
    engine.addMapping(name, renderParams);
    log('action', `生成渲染: ${name} → ${reasoning || JSON.stringify(renderParams).slice(0,80)}`);
    renderTokenList();
    renderMappingList();
  } catch(e) {
    log('err', '生成渲染失败: ' + e.message);
  } finally {
    generatingSet.delete(name);
    renderTokenList();
  }
};

const engine = new TokenEngine();

window.toggleSidebar = function(side) {
  const sb = document.getElementById(side === 'left' ? 'sidebarLeft' : 'sidebarRight');
  const btn = document.getElementById(side === 'left' ? 'bLeft' : 'bRight');
  const isOpen = sb.classList.contains('open');
  if(isOpen) {
    sb.classList.remove('open');
    btn.classList.remove('on');
  } else {
    sb.classList.add('open');
    btn.classList.add('on');
    if(side === 'left') { renderTokenList(); renderPackSelect(); renderMappingList(); }
  }
};

window.toggleSection = function(id) {
  const body = document.getElementById('sec' + id.charAt(0).toUpperCase() + id.slice(1));
  const header = document.getElementById('sec' + id.charAt(0).toUpperCase() + id.slice(1) + 'H');
  const isShown = body.classList.contains('show');
  if(isShown) {
    body.classList.remove('show');
    header.classList.remove('expanded');
    body.style.maxHeight = '0';
  } else {
    body.classList.add('show');
    header.classList.add('expanded');
    body.style.maxHeight = '2000px';
  }
};

function renderPackSelect() {
  const sel = document.getElementById('packSelect');
  if(!sel) return;
  const packs = engine.listPacks();
  sel.innerHTML = packs.map(p => `<option value="${p.id}" ${p.active?'selected':''}>${p.name} (${p.count})</option>`).join('');
}

window.switchPack = function(id) {
  engine.switchPack(id);
  renderPackSelect();
  renderMappingList();
  renderTokenList();
  updateSidebarInfo();
};

window.createNewPack = function() {
  const name = prompt('新素材包名称：');
  if(!name) return;
  const id = engine.createPack(name);
  engine.switchPack(id);
  renderPackSelect();
  renderMappingList();
  renderTokenList();
  updateSidebarInfo();
  log('action', '新建素材包: ' + name);
};

window.exportPack = function() {
  const data = engine.exportPackData();
  const blob = new Blob([data], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = engine.assetPack.name + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

window.importPack = function(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      const id = engine.importPackData(data);
      engine.switchPack(id);
      renderPackSelect();
      renderMappingList();
      renderTokenList();
      updateSidebarInfo();
      log('action', '导入素材包: ' + (data.name || id));
    } catch(err) {
      alert('导入失败: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

function renderTokenList() {
  const d = engine.dictionary;
  const search = (document.getElementById('tokenSearch')?.value || '').toLowerCase().trim();
  const container = document.getElementById('tokenList');
  if(!container) return;

  let mapped = [], unmapped = [];
  for(const [n] of Object.entries(d.tokens)) {
    if(search && !n.toLowerCase().includes(search)) continue;
    if(engine.hasMapping(n)) mapped.push(n);
    else unmapped.push(n);
  }

  let html = '';

  if(mapped.length) {
    html += `<div class="pk-section">已映射 (${mapped.length})</div>`;
    for(const name of mapped) {
      const m = engine.assetPack.mappings[name];
      const hasColor = m && m.color;
      const isActive = engine.activeTokenNames.includes(name);
      const dotStyle = hasColor
        ? `background:rgb(${Math.round(m.color[0]*255)},${Math.round(m.color[1]*255)},${Math.round(m.color[2]*255)})`
        : '';
      html += `<div class="tk-item ${isActive ? 'active' : ''}" onclick="previewMapping('${name.replace(/'/g,"\\'")}')">
        <span class="tk-dot" style="${dotStyle}"></span>
        <span class="tk-name">${name}</span>
        <button class="tk-gen ${generatingSet.has(name)?'loading':''}" onclick="event.stopPropagation();generateRendering('${name.replace(/'/g,"\\'")}')">${generatingSet.has(name)?'生成中...':'重新渲染'}</button>
      </div>`;
    }
  }

  if(unmapped.length) {
    html += `<div class="pk-section">待生成 (${unmapped.length})</div>`;
    for(const name of unmapped) {
      const isActive = engine.activeTokenNames.includes(name);
      const isLoading = generatingSet.has(name);
      html += `<div class="tk-item ${isActive ? 'active' : ''}">
        <span class="tk-dot"></span>
        <span class="tk-name">${name}</span>
        <button class="tk-gen ${isLoading ? 'loading' : ''}" onclick="generateRendering('${name.replace(/'/g,"\\'")}')">${isLoading ? '生成中...' : '生成渲染'}</button>
      </div>`;
    }
  }

  if(!html) html = '<div class="tk-empty">暂无 token</div>';
  container.innerHTML = html;
  updateSidebarInfo();
}
window.renderTokenList = renderTokenList;

function renderMappingList() {
  const p = engine.assetPack;
  const container = document.getElementById('mappingList');
  if(!container) return;

  const colorMappings = [], arrangementMappings = [], composeMappings = [];
  for(const [n,m] of Object.entries(p.mappings)) {
    if(m.compose) composeMappings.push({name:n,...m});
    else if(m.arrangement || m.shape) arrangementMappings.push({name:n,...m});
    else if(m.color || m.spread !== undefined) colorMappings.push({name:n,...m});
  }

  let html = `<div class="pk-hdr"><b>${p.name}</b> · ${Object.keys(p.mappings).length} mappings</div>`;

window.previewMapping = function(name) {
    const m = engine.assetPack.mappings[name];
    if(!m) return;
    if(m.compose) {
      const sub = engine._resolveCompose(m.compose, {});
      if(sub.emotion) springPool.applyEmotion(sub.emotion);
      if(sub.shape) { actionQueue=[]; currentAction=null; heldAction=null; queueShapeAction({...sub.shape, ...(m.hold!==undefined?{hold:m.hold}:{}), duration:m.duration||2500}); }
    } else if(m.arrangement || m.shape) {
      actionQueue=[]; currentAction=null; heldAction=null;
      queueShapeAction(m);
      if(m.color) springPool.applyEmotion(m);
    } else if(m.color || m.spread !== undefined) {
      springPool.applyEmotion(m);
    }
    engine.activeTokenNames = [name];
    updateTokenTags();
    log('action', '预览: ' + name);
  };

  if(colorMappings.length) {
    html += `<div class="pk-section">色彩 (${colorMappings.length})</div>`;
    for(const m of colorMappings) {
      const c = m.color || [0.4,0.4,0.45];
      html += `<div class="pk-item" onclick="previewMapping('${m.name.replace(/'/g,"\\'")}')">
        <span class="pk-color" style="background:rgb(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)})"></span>
        <span class="pk-name">${m.name}</span>
        <span class="pk-mapping">spd:${(m.speed||0).toFixed(3)}</span>
      </div>`;
    }
  }
  if(arrangementMappings.length) {
    html += `<div class="pk-section">排列+运动 (${arrangementMappings.length})</div>`;
    for(const m of arrangementMappings) {
      const arr = m.arrangement || m.shape || '?';
      const mov = m.movement ? `→${m.movement}` : '';
      const pal = m.palette ? `🎨${m.palette}` : '';
      const c = m.color || [0.4,0.4,0.45];
      html += `<div class="pk-item" onclick="previewMapping('${m.name.replace(/'/g,"\\'")}')">
        <span class="pk-color" style="background:rgb(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)})"></span>
        <span class="pk-name">${m.name}</span>
        <span class="pk-mapping">${arr}${mov}${pal}</span>
      </div>`;
    }
  }
  if(composeMappings.length) {
    html += `<div class="pk-section">组合 (${composeMappings.length})</div>`;
    for(const m of composeMappings) {
      html += `<div class="pk-item" onclick="previewMapping('${m.name.replace(/'/g,"\\'")}')">
        <span class="pk-name">${m.name}</span>
        <span class="pk-mapping">${m.compose.join(' + ')}</span>
      </div>`;
    }
  }
  if(!colorMappings.length && !arrangementMappings.length && !composeMappings.length) {
    html += '<div style="text-align:center;padding:10px 0;color:rgba(100,140,180,0.15);font-size:10px">空素材包</div>';
  }

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════

let particles = [];
let geo, mesh;

function createParticle(i) {
  const angle = (i / N) * Math.PI * 2;
  const r = 0.3 + Math.random() * 0.3;
  return {
    x: Math.cos(angle) * r * 0.5,
    y: Math.sin(angle) * r * 0.3 + (Math.random()-0.5)*0.3,
    z: (Math.random()-0.5) * 0.3,
    vx: (Math.random()-0.5)*0.001,
    vy: (Math.random()-0.5)*0.001,
    vz: (Math.random()-0.5)*0.0005,
    tx: 0, ty: 0, tz: 0,
    hasTarget: false,
    phase: Math.random() * Math.PI * 2
  };
}

function rebuildBody(n) {
  if(mesh) { scene.remove(mesh); geo.dispose(); }
  N = n;
  particles = [];
  for(let i=0; i<N; i++) particles.push(createParticle(i));
  const pos = new Float32Array(N*3);
  const col = new Float32Array(N*3);
  geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.ShaderMaterial({
    uniforms: { uPR:{value:Math.min(devicePixelRatio,2)} },
    vertexShader: `attribute vec3 aColor;varying vec3 vC;uniform float uPR;
      void main(){
        vC=aColor;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=14.0*uPR*(1.0/-mv.z);
        gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader: `varying vec3 vC;void main(){
      float d=length(gl_PointCoord-vec2(0.5));
      if(d>0.5)discard;
      float glow=smoothstep(0.5,0.0,d);
      gl_FragColor=vec4(vC*glow*1.3, smoothstep(0.5,0.3,d)*0.9);
    }`,
    transparent:true, depthWrite:true,
  });
  mesh = new THREE.Points(geo, mat);
  scene.add(mesh);
}

// ═══ ACTION QUEUE ═══
let actionQueue = [];
let currentAction = null;
let actionProgress = 0;
let heldAction = null;

function queueShapeAction(mapping) {
  const arrName = mapping.arrangement || mapping.shape;
  const fn = ARRANGEMENTS[arrName];
  if(!fn) { log('action','未知排列: '+arrName); return; }
  const scale = Math.max(0, Math.min(1, mapping.arrangement_scale ?? mapping.tightness ?? 0.5));
  const speedMap = {slow:0.006, normal:0.018, fast:0.045};
  const speed = speedMap[mapping.motion_speed] || 0.018;
  const duration = mapping.duration || 2500;
  const hold = mapping.hold || false;
  const targets = [];
  for(let i=0; i<N; i++) {
    const [tx,ty,tz] = fn(i, N, {scale, tightness:scale});
    targets.push({index:i, tx, ty, tz});
  }
  actionQueue.push({
    targets, duration, speed,
    name:'shape-'+arrName, hold, startTime:null,
    movement: mapping.movement || null,
    movementParams: mapping,
    palette: mapping.palette || null,
    paletteParams: mapping.palette_params || null,
    colorVariation: mapping.color_variation || 0,
  });
}

// ═══════════════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════════════

function updatePhysics(dt, time) {
  if(!currentAction && actionQueue.length > 0) {
    currentAction = actionQueue.shift();
    currentAction.startTime = time;
    actionProgress = 0;
    heldAction = null;
    for(let i=0; i<N; i++) particles[i].hasTarget = false;
    log('action', '▶ ' + (currentAction.name||'action') + ' (' + currentAction.duration + 'ms)' + (currentAction.hold?' [HOLD]':''));
    if(currentAction.targets) {
      for(const t of currentAction.targets) {
        if(t.index>=0 && t.index<N) {
          const p=particles[t.index];
          p.tx=t.tx; p.ty=t.ty; p.tz=t.tz;
          p.hasTarget=true;
        }
      }
    }
  }

  if(currentAction) {
    actionProgress = Math.min(1, (time - currentAction.startTime) / (currentAction.duration/1000));
    if(actionProgress >= 1) {
      if(currentAction.hold) {
        log('action', '⊗ ' + (currentAction.name||'action') + ' 维持中');
        heldAction = currentAction;
      } else {
        for(let i=0; i<N; i++) particles[i].hasTarget = false;
        log('action', '■ ' + (currentAction.name||'action') + ' 完成');
      }
      currentAction = null;
    }
  }

  const sv = springPool.vals();
  const spread=sv.spread, breatheAmp=sv.breathe_amp, breatheFreq=sv.breathe_freq;

  for(let i=0; i<N; i++) {
    const p = particles[i];
    p.y += Math.sin(time * breatheFreq + p.phase) * breatheAmp * 0.15 * 0.02;
    for(let j=i+1; j<N && j<i+8; j++) {
      const q=particles[j];
      const dx=p.x-q.x, dy=p.y-q.y, dz=p.z-q.z;
      const dist=Math.sqrt(dx*dx+dy*dy+dz*dz)||0.001;
      if(dist<0.06) {
        const f=(0.06-dist)/dist*0.00005;
        p.vx+=dx*f; p.vy+=dy*f; p.vz+=dz*f;
        q.vx-=dx*f; q.vy-=dy*f; q.vz-=dz*f;
      }
    }
    if(Math.abs(spread)>0.001) {
      const d=Math.sqrt(p.x*p.x+p.y*p.y)||0.01;
      p.vx+=(p.x/d)*spread*0.0003;
      p.vy+=(p.y/d)*spread*0.0003;
    }
    const activeTarget = (p.hasTarget && currentAction) || heldAction;
    if(activeTarget) {
      let etx=p.tx, ety=p.ty, etz=p.tz;
      if(activeTarget.movement && MOVEMENTS[activeTarget.movement]) {
        const [mx,my,mz]=MOVEMENTS[activeTarget.movement](i, N, time, activeTarget.movementParams||{}, p);
        etx+=mx; ety+=my; etz+=mz;
      }
      const stiffness = currentAction ? (currentAction.speed||0.02) : 0.08;
      const ease = smoothstep(currentAction ? actionProgress : 1);
      p.vx+=(etx-p.x)*stiffness*(1+ease);
      p.vy+=(ety-p.y)*stiffness*(1+ease);
      p.vz+=(etz-p.z)*stiffness*(1+ease);
    }
    if(Math.abs(p.x)>1.5) p.vx-=p.x*0.002;
    if(Math.abs(p.y)>1.2) p.vy-=p.y*0.002;
    if(Math.abs(p.z)>0.8) p.vz-=p.z*0.002;
    p.vx*=0.88; p.vy*=0.88; p.vz*=0.88;
    p.x+=p.vx; p.y+=p.vy; p.z+=p.vz;
  }
}

function smoothstep(t) { return t*t*(3-2*t); }

const DN=40;
const dP=new Float32Array(DN*3);
const dV=[];
for(let i=0;i<DN;i++){
  dP[i*3]=(Math.random()-.5)*3;dP[i*3+1]=(Math.random()-.5)*2.5;dP[i*3+2]=(Math.random()-.5)*1.5;
  dV.push({sp:.1+Math.random()*.3, ph:Math.random()*Math.PI*2, r:.3+Math.random()*.5, cy:(Math.random()-.5)*2, cx:(Math.random()-.5)*2});
}
const dG=new THREE.BufferGeometry();
dG.setAttribute('position', new THREE.BufferAttribute(dP, 3));
const dM=new THREE.ShaderMaterial({
  uniforms:{uPR:{value:Math.min(devicePixelRatio,2)}},
  vertexShader:'varying float vA;uniform float uPR;void main(){vA=.1;vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=2.0*uPR*(1.0/-mv.z);gl_Position=projectionMatrix*mv;}',
  fragmentShader:'varying float vA;void main(){float d=length(gl_PointCoord-vec2(0.5));if(d>0.5)discard;gl_FragColor=vec4(0.3,0.5,0.7,smoothstep(0.5,0.47,d)*vA);}',
  transparent:true, depthWrite:false,
});
scene.add(new THREE.Points(dG, dM));

// ═══════════════════════════════════════════════════════
// AI SYSTEM
// ═══════════════════════════════════════════════════════

async function callAI(text) {
  if(!SIProviders.getApiKey()) { showReply('请先配置 API Key（右上角 ⚙）'); return null; }
  document.getElementById('sendBtn').disabled = true;
  showReply('...');

  log('div','');
  log('label','请求 '+new Date().toLocaleTimeString());
  log('meta','输入: "'+text+'"');
  log('meta','提供商: '+SIProviders.getProvider().name+' · 模型: '+SIProviders.getModel()+' · 粒子: '+N);

  isThinking = true;
  const t0 = performance.now();
  try {
    const systemMsg = promptBuilder.build(engine.dictionary);
    const userMessages = [...conversationHistory, {role:'user', content:text}];

    let result;
    try {
      result = await SIProviders.call(systemMsg, userMessages);
    } catch(e) {
      if(e.message.includes('429')) {
        log('meta','速率限制，5秒后重试...');
        showReply('速率限制，等待中...');
        await new Promise(r2=>setTimeout(r2,5000));
        result = await SIProviders.call(systemMsg, userMessages);
      } else throw e;
    }

    const sec = ((performance.now()-t0)/1000).toFixed(2);
    log('meta','耗时 '+sec+'s · tokens: '+result.usage.input+'+'+result.usage.output+'='+result.usage.total);

    const raw = result.content;
    if(!raw) { log('err','AI返回空'); showReply('空响应'); isThinking=false; return null; }

    log('label','AI 回复');
    log('json', raw.length>800 ? raw.slice(0,800)+'...' : raw);

    let parsed;
    const cleaned = raw.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
    try {
      parsed = JSON.parse(cleaned);
    } catch(e1) {
      try {
        const depth = (s,start) => { let d=0; for(let i=start;i<s.length;i++){if(s[i]==='{')d++;if(s[i]==='}')d--;if(d===0)return i} return -1 };
        const first = raw.indexOf('{');
        if(first >= 0) {
          const last = depth(raw, first);
          if(last > 0) parsed = JSON.parse(raw.slice(first, last+1));
        }
      } catch(e2) {
        try {
          const fixed = cleaned.replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
          const first = fixed.indexOf('{');
          const last = fixed.lastIndexOf('}');
          if(first >= 0 && last > first) parsed = JSON.parse(fixed.slice(first, last+1));
        } catch(e3) {
          log('meta','JSON解析失败，作为纯文本处理');
          parsed = {content: cleaned.replace(/[{}[\]"]/g,'').trim()};
        }
      }
    }

    const reply = parsed.content || raw;
    if(reply) {
      showReply(reply);
      conversationHistory.push({role:'assistant', content: raw});
    }

    const tokenInputs = parsed.tokens || parsed.body?.tokens || [];
    if(tokenInputs.length) {
      log('label','Token 解析');
      log('json', JSON.stringify(tokenInputs));

      const resolved = engine.resolve(tokenInputs);
      log('action','tokens: ' + engine.activeTokenNames.join(', '));

      if(resolved.emotion) springPool.applyEmotion(resolved.emotion);
      if(resolved.shape) {
        actionQueue = [];
        currentAction = null;
        heldAction = null;
        queueShapeAction(resolved.shape);
      }

      if(resolved.pendingRender.length) {
        log('action','自动生成渲染: ' + resolved.pendingRender.join(', '));
        (async () => {
          for(const name of resolved.pendingRender) {
            await generateRendering(name);
          }
          const autoResolved = engine.resolve(resolved.pendingRender);
          if(autoResolved.emotion) springPool.applyEmotion(autoResolved.emotion);
          if(autoResolved.shape) {
            actionQueue=[]; currentAction=null; heldAction=null;
            queueShapeAction(autoResolved.shape);
          }
          updateTokenTags();
          renderMappingList();
        })();
      }

      updateTokenTags();
    }

    isThinking = false;
    return parsed;
  } catch(e) {
    log('err', e.message);
    showReply('错误: '+e.message);
    isThinking = false;
    return null;
  } finally {
    document.getElementById('sendBtn').disabled = false;
  }
}

function updateTokenTags() {
  const el = document.getElementById('tokenTags');
  el.innerHTML = engine.activeTokenNames.map(n =>
    `<span class="ttag">${n}</span>`
  ).join('');
  renderTokenList();
}

// ═══ SEND ═══
let conversationHistory = [];

window.send = async function() {
  const inp = document.getElementById('msgIn');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  conversationHistory.push({role:'user', content: text});
  if(conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
  await callAI(text);
};

document.getElementById('msgIn').addEventListener('keydown', e => { if(e.key==='Enter') send(); });

// ═══════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════

rebuildBody(N);
springPool.applyDefault(engine.assetPack.default_mapping);

const clock = new THREE.Clock();
let fc=0, fps=0, lf=0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  fc++; if(t-lf>=1) { fps=fc; fc=0; lf=t; document.getElementById('fps').textContent=(N+DN)+'p · '+fps+'fps'; }

  springPool.update(dt);
  updatePhysics(dt, t);

  const sv = springPool.vals();
  bloomPass.strength = sv.bloom_strength;

  if(isThinking) {
    mesh.rotation.y += dt*0.5;
    mesh.rotation.x = Math.sin(t*0.3)*0.15;
  } else {
    mesh.rotation.y += (0-mesh.rotation.y)*0.03;
    mesh.rotation.x += (0-mesh.rotation.x)*0.03;
  }

  const pA = geo.attributes.position.array;
  const cA = geo.attributes.aColor.array;
  const cr=sv.color_r, cg=sv.color_g, cb=sv.color_b;
  const act = heldAction || currentAction;
  let pal = null;
  if(act) {
    if(act.palette && PALETTES[act.palette]) pal = PALETTES[act.palette];
    else if(act.paletteParams) pal = act.paletteParams;
  }
  const cv = act ? (act.colorVariation || 0) : 0;

  for(let i=0; i<N; i++) {
    const p = particles[i];
    const j = i*3;
    pA[j]=p.x; pA[j+1]=p.y; pA[j+2]=p.z;
    if(pal) {
      const [pr,pg,pb] = cosinePalette(i/N+t*0.05, pal.a, pal.b, pal.c, pal.d);
      cA[j]=pr; cA[j+1]=pg; cA[j+2]=pb;
    } else if(cv > 0.001) {
      const v = noise3D(p.x*2, p.y*2, t*0.3) * cv;
      cA[j]=cr+v; cA[j+1]=cg+v*0.5; cA[j+2]=cb-v*0.3;
    } else {
      cA[j]=cr; cA[j+1]=cg; cA[j+2]=cb;
    }
  }
  geo.attributes.position.needsUpdate = true;
  geo.attributes.aColor.needsUpdate = true;

  const dpA = dG.attributes.position.array;
  for(let i=0;i<DN;i++){
    const v=dV[i];
    dpA[i*3]=v.cx+Math.sin(t*v.sp+v.ph)*v.r;
    dpA[i*3+1]=v.cy+Math.cos(t*v.sp*.7+v.ph)*v.r*.5;
    dpA[i*3+2]=Math.sin(t*v.sp*.5+v.ph*2)*.3;
  }
  dG.attributes.position.needsUpdate=true;

  controls.update();
  comp.render();
}
animate();

log('label','灵墨 v4.0 启动');
log('meta','粒子: '+N+' · 词典: '+Object.keys(engine.dictionary.tokens).length+' tokens · 素材包: '+engine.assetPack.name+' ('+Object.keys(engine.assetPack.mappings).length+')');
</script>
